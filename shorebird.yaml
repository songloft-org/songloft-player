# Shorebird 配置（详见 docs/cn/shorebird_hot_update.md）
#
# app_id 是「公开标识」（非密钥），可安全提交。但本项目约定：真实 app_id 存放在
# GitHub Actions 仓库变量 `SHOREBIRD_APP_ID`，由 CI 在正式版（tag）构建/补丁前
# 覆写下方占位值再执行 `shorebird release` / `shorebird patch`（见
# .github/workflows/build-and-release.yml、shorebird-patch.yml）。
#
# 这里保留占位符仅为满足 pubspec `assets:` 对文件存在的要求——dev / web / desktop
# 等非 Shorebird 构建会打包本文件但不启用 updater（未内置 Shorebird 引擎），占位值
# 无副作用。首次接入时用 `shorebird init` 生成真实 app_id 后，填入 GitHub 变量即可。
app_id: 00000000-0000-0000-0000-000000000000

# false：updater 不自动后台下载。由客户端代码（ShorebirdUpdateService + 首页流程）
# 主动检查 → 弹「发现新版本」→ 下载进度 → 「重启生效」提示。改成主动式更新 UX。
auto_update: false
