name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main      # push 到 main 自动打测试包（全平台 dev 构建 + main 的 prerelease）
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_web:
        description: '构建 Web (standalone + embedded)'
        type: boolean
        default: true
      build_linux:
        description: '构建 Linux (x64)'
        type: boolean
        default: true
      build_windows:
        description: '构建 Windows (x64)'
        type: boolean
        default: true
      build_macos:
        description: '构建 macOS (Universal)'
        type: boolean
        default: true
      build_android:
        description: '构建 Android (APK)'
        type: boolean
        default: true
      build_ios:
        description: '构建 iOS (No Codesign)'
        type: boolean
        default: true

# 同一 ref 只保留最新一次运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'

permissions:
  contents: write

jobs:
  # ============================================================
  # 构建矩阵
  # ============================================================
  build-web:
    name: Web (${{ matrix.mode }})
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_web }}
    strategy:
      matrix:
        mode: [standalone, embedded]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: flutter build web --release --no-web-resources-cdn --dart-define=DEPLOY_MODE=${{ matrix.mode }} --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Package
        run: |
          cd build/web
          tar czf "$GITHUB_WORKSPACE/songloft-web-${{ matrix.mode }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-web-${{ matrix.mode }}
          path: songloft-web-${{ matrix.mode }}.tar.gz

  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_linux }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libglu1-mesa libstdc++-12-dev libsecret-1-dev libayatana-appindicator3-dev
          # 用于 DEB/RPM/AppImage 构建
          sudo apt-get install -y rpm patchelf
      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          # GitHub Actions 容器不支持 FUSE，设置此环境变量让 AppImage 工具以 extract 模式运行
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install fastforge
        run: dart pub global activate fastforge
      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: flutter build linux --release --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Prepare app icon for fastforge
        run: |
          mkdir -p assets/icons
          cp web/icons/Icon-512.png assets/icons/app_icon.png
      - name: Package tar.gz (基础便携包)
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/songloft-linux-x64.tar.gz" .
      - name: Build DEB package
        continue-on-error: true
        run: |
          fastforge package --platform linux --targets deb
          DEB_FILE=$(find dist -maxdepth 2 -name "*.deb" -print -quit 2>/dev/null)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" ./songloft-linux-x64.deb
          fi
      - name: Build RPM package
        continue-on-error: true
        run: |
          fastforge package --platform linux --targets rpm
          RPM_FILE=$(find dist -maxdepth 2 -name "*.rpm" -print -quit 2>/dev/null)
          if [ -n "$RPM_FILE" ]; then
            cp "$RPM_FILE" ./songloft-linux-x64.rpm
          fi
      - name: Build AppImage
        continue-on-error: true
        run: |
          fastforge package --platform linux --targets appimage
          APPIMAGE_FILE=$(find dist -maxdepth 2 -name "*.AppImage" -print -quit 2>/dev/null)
          if [ -n "$APPIMAGE_FILE" ]; then
            cp "$APPIMAGE_FILE" ./songloft-linux-x64.AppImage
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-linux-x64
          path: |
            songloft-linux-x64.tar.gz
            songloft-linux-x64.deb
            songloft-linux-x64.rpm
            songloft-linux-x64.AppImage

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_windows }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install fastforge
        run: dart pub global activate fastforge
      - name: Add pub cache to PATH
        shell: pwsh
        run: echo "$env:LOCALAPPDATA\Pub\Cache\bin" >> $env:GITHUB_PATH
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        shell: pwsh
        run: |
          $versionLine = (Select-String -Path pubspec.yaml -Pattern '^version:' | Select-Object -First 1).Line
          $version = ($versionLine -replace 'version:\s*', '') -replace '\+.*', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - run: flutter build windows --release --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Package ZIP (绿色便携包)
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath songloft-windows-x64.zip
      - name: Build MSIX package
        continue-on-error: true
        shell: pwsh
        run: |
          fastforge package --platform windows --targets msix
          $msixFile = Get-ChildItem -Path "dist" -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msixFile) {
            Copy-Item $msixFile.FullName -Destination songloft-windows-x64.msix
          }
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-windows-x64
          path: |
            songloft-windows-x64.zip
            songloft-windows-x64.msix

  build-macos:
    name: macOS (Universal)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_macos }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install fastforge and appdmg
        run: |
          dart pub global activate fastforge
          npm install -g appdmg
      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: flutter build macos --release --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Package ZIP (.app)
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y "$GITHUB_WORKSPACE/songloft-macos.zip" *.app
      - name: Build DMG
        continue-on-error: true
        run: |
          fastforge package --platform macos --targets dmg
          DMG_FILE=$(find dist -maxdepth 2 -name "*.dmg" -print -quit 2>/dev/null)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" ./songloft-macos.dmg
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-macos
          path: |
            songloft-macos.zip
            songloft-macos.dmg

  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          fi
      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Collect APKs
        run: |
          mkdir -p apk-output
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk apk-output/songloft-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk apk-output/songloft-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk apk-output/songloft-x86_64.apk
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-android-apk
          path: apk-output/*.apk

  build-ios:
    name: iOS (No Codesign)
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: flutter build ios --release --no-codesign --dart-define=FRONTEND_VERSION=${{ steps.version.outputs.version }} --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}
      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r -y songloft-ios-nosign.ipa Payload
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: songloft-ios
          path: songloft-ios-nosign.ipa

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    name: Create Release
    if: ${{ always() }}
    needs:
      - build-web
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以生成 changelog

      - name: Determine release info
        id: release_info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=Release $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            # 分支触发（push to main / workflow_dispatch）统一用 dev tag 滚动 prerelease
            BRANCH="${GITHUB_REF#refs/heads/}"
            echo "tag=dev" >> "$GITHUB_OUTPUT"
            echo "name=Dev Build ($BRANCH)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ steps.release_info.outputs.tag }}"
          HEAD_SHA=$(git rev-parse HEAD)

          if [[ "$CURRENT_TAG" == "dev" ]]; then
            # dev 构建：排除指向 HEAD 同一 commit 的 tag，防止 fromTag==toTag 导致 changelog 为空报错
            PREV_TAG=""
            for tag in $(git --no-pager tag --sort=-creatordate --merged HEAD | grep '^v'); do
              TAG_SHA=$(git rev-list -n1 "$tag")
              if [[ "$TAG_SHA" != "$HEAD_SHA" ]]; then
                PREV_TAG="$tag"
                break
              fi
            done
          else
            # release 构建：按名称排除当前 tag
            PREV_TAG=$(git --no-pager tag --sort=creatordate --merged HEAD | grep '^v' | grep -v "^${CURRENT_TAG}$" | tail -1)
          fi

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "No previous tag found, using first commit: ${PREV_TAG}"
          else
            echo "Previous tag: ${PREV_TAG}"
          fi

          echo "previous_tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Generate Changelog from Conventional Commits
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          fromTag: ${{ startsWith(github.ref, 'refs/tags/') && steps.release_info.outputs.tag || github.sha }}
          toTag: ${{ steps.prev-tag.outputs.previous_tag }}
          writeToFile: false
          useGitmojis: true
          includeInvalidCommits: false
          restrictToTypes: feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
        continue-on-error: true

      - name: Flatten artifacts
        run: |
          mkdir -p final-assets
          if [ -d release-assets ]; then
            find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.apk' -o -name '*.ipa' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.msix' \) -exec cp {} final-assets/ \;
          fi
          echo "=== Release Assets ==="
          ls -lh final-assets/ || echo "(no assets)"

      - name: Delete existing release (for branch builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.release_info.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.changes }}
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          TITLE="${{ steps.release_info.outputs.name }}"
          IS_PRERELEASE="${{ steps.release_info.outputs.prerelease }}"
          MAKE_LATEST="${{ steps.release_info.outputs.make_latest }}"

          # 通过环境变量获取 changelog，避免反引号等特殊字符被 shell 解释
          RELEASE_NOTES="${CHANGELOG_BODY}"

          # 如果 changelog 为空，使用默认内容
          if [ -z "$RELEASE_NOTES" ] || [ "$RELEASE_NOTES" = "" ]; then
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              RELEASE_NOTES="Development build from branch: ${{ github.ref_name }}"
            else
              RELEASE_NOTES="Release ${TAG}"
            fi
          fi

          ARGS=(
            "${TAG}"
            --title "${TITLE}"
            --notes "${RELEASE_NOTES}"
          )

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi

          if [[ "${MAKE_LATEST}" == "true" ]]; then
            ARGS+=(--latest)
          fi

          # 对于 tag 触发，直接使用已有 tag；对于分支触发，需要指定 target
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            ARGS+=(--target "${{ github.sha }}")
          fi

          # 有产物则附加上传，否则仅创建 Release
          if compgen -G "final-assets/*" > /dev/null 2>&1; then
            gh release create "${ARGS[@]}" final-assets/*
          else
            gh release create "${ARGS[@]}"
          fi
