name: Patch Release

# 手动触发的 Android 热更新补丁发布(flutter_patcher,整包替换 libapp.so)。
# 用法:从要修复的版本代码上 cherry-pick「纯 Dart」修复(保持 pubspec versionCode 不变)
# 后 dispatch 本 workflow。产出按 ABI 分片的 patch-<abi>.zip + manifest-<abi>.json,
# 作为资产上传到对应版本的 GitHub Release,客户端启动检查后手动下载生效。
# 详见 docs/cn/flutter_patcher_hotupdate.md。仅 Android;iOS/桌面/Web 不涉及。

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: '目标基线版本:stable 填版本号(如 2.11.0,挂到 tag v2.11.0);dev 填 dev(挂到滚动 dev release)'
        required: true
        default: dev
      patch_label:
        description: '补丁版本名(写入 manifest.version,用于展示/忽略,如 2.11.0-h1)'
        required: true

env:
  FLUTTER_VERSION: '3.44.6'

permissions:
  contents: write

concurrency:
  group: patch-release-${{ inputs.target_version }}
  cancel-in-progress: false

jobs:
  patch:
    name: Build & publish patch (${{ inputs.target_version }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Resolve release tag / versionCode / frontend version
        id: meta
        run: |
          TV='${{ inputs.target_version }}'
          if [ "$TV" = "dev" ]; then
            TAG="dev"
            FRONTEND_VERSION="dev"
          else
            TAG="v${TV}"
            FRONTEND_VERSION="${TV}"
          fi
          # versionCode = pubspec version 的 +N 部分
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_CODE=$(echo "$PUBSPEC_VERSION" | cut -d'+' -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_version=$FRONTEND_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "解析: tag=$TAG versionCode=$VERSION_CODE frontend=$FRONTEND_VERSION"

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build release APK (split-per-abi)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 与线上 APK 同配置(尤其 FRONTEND_VERSION 保持基线渠道值),仅 Dart 有改动。
          flutter build apk --release --split-per-abi \
            --dart-define=FRONTEND_VERSION=${{ steps.meta.outputs.frontend_version }} \
            --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} \
            --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} \
            --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}

      - name: Pack per-ABI patches + write manifests
        id: pack
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          PATCH_LABEL: ${{ inputs.patch_label }}
        run: |
          set -e
          mkdir -p out
          for abi in arm64-v8a armeabi-v7a x86_64; do
            apk="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ ! -f "$apk" ]; then
              echo "跳过 $abi(无 APK: $apk)"; continue
            fi
            rm -rf dist
            dart run flutter_patcher:pack \
              --apk "$apk" \
              --version "$PATCH_LABEL" \
              --target-version-code "$VERSION_CODE" \
              --abi "$abi"
            cp dist/patch.zip "out/patch-${abi}.zip"
            # md5 取最终 patch-<abi>.zip 的(即客户端下载校验的文件)
            MD5=$(md5sum "out/patch-${abi}.zip" | cut -d' ' -f1)
            URL="https://github.com/${REPO}/releases/download/${TAG}/patch-${abi}.zip"
            cat > "out/manifest-${abi}.json" <<EOF
          {
            "hasUpdate": true,
            "patch": {
              "version": "${PATCH_LABEL}",
              "patchUrl": "${URL}",
              "md5": "${MD5}",
              "targetVersionCode": ${VERSION_CODE}
            }
          }
          EOF
            echo "打包 $abi: md5=$MD5"
          done
          ls -lh out/

      - name: Upload patch assets to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" out/manifest-*.json out/patch-*.zip --clobber
          echo "已上传到 Release ${{ steps.meta.outputs.tag }}"
