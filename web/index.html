<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Songloft - 跨平台音乐播放器">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <!-- NextConsole 调试面板：在设置页面启用后，刷新页面自动加载。
       读取 localStorage 中 flutter.web_debug_console 的值决定是否激活。 -->
  <script>
  (function () {
    try {
      var enabled = false;
      try { enabled = localStorage.getItem('flutter.web_debug_console') === 'true'; } catch (_) {}
      if (!enabled) return;
      var s = document.createElement('script');
      s.src = 'nextconsole.umd.js';
      s.onload = function () {
        try {
          // 官方 UMD 产物的全局 window.NextConsole 是命名空间对象
          // ({ NextConsole: 类, default: 类, ... })，并非构造函数本身；
          // 官方 README 的 `new NextConsole()` 示例在 UMD 下会抛
          // TypeError。取命名空间里的类再实例化。
          var ns = window.NextConsole;
          var Ctor = (ns && (ns.NextConsole || ns.default)) || ns;
          new Ctor({ theme: 'dark' });
        } catch (e) { console.error('[NextConsole] init failed', e); }
      };
      document.head.appendChild(s);
    } catch (_) {}
  })();
  </script>
  <script src="equalizer.js"></script>
  <script src="hls.min.js"></script>
  <script src="hls_bridge.js"></script>
  <script src="deploy-mode.js"></script>
  <!--
    已知问题:移动端切后台回来可能白屏。根因是引擎 bug flutter/flutter#184683
    (CanvasKit 处理 WebGL context 丢失时访问未初始化的 late 字段,抛
    LateInitializationError,渲染帧崩溃)。官方修复 #185116 尚未进 stable 3.44.6
    (仅 beta 3.47+),当前按现状接受;待 3.47 进 stable 后升级即可根治。页面侧的
    渲染器强制/恢复绕法已移除(在含 bug 的版本上要么无效、要么反而触发崩溃)。
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    var config = {
      canvasKitVariant: "full",
      // Web 强制 CanvasKit CPU(软件)光栅：关闭 WebGL、消除 GPU 纹理，根治列表封面
      // 切页面 / 切后台回来偶发纯黑。根因是 Chrome 单 WebGL context 在 platform view
      // (插件 iframe / 视频)造成 GPU 压力时触发 context-loss、封面 WebCodecs VideoFrame
      // 惰性纹理失效(flutter/flutter#184683 同族；#185116 只修崩溃、不修纹理变黑)。应用层
      // imageCache.evict + 重解码只能概率缓解惰性纹理绑 context 的时序竞态、无法根治，故
      // 关 GPU 兜底。代价：全局软件光栅，播放页全屏模糊背景进页/切歌有卡顿(封面列表页无
      // 模糊、影响小)。插件 iframe / 视频是 DOM 元素、不经 Flutter GPU 合成，零影响。
      // 原生平台不读本文件，仅作用于 web/embedded。删除本行重新构建即恢复 GPU 渲染。
      canvasKitForceCpuOnly: true,
    };

    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
