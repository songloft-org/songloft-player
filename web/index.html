<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Songloft - 跨平台音乐播放器">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <!-- NextConsole 调试面板：在设置页面启用后，刷新页面自动加载。
       读取 localStorage 中 flutter.web_debug_console 的值决定是否激活。 -->
  <script>
  (function () {
    try {
      var enabled = false;
      try { enabled = localStorage.getItem('flutter.web_debug_console') === 'true'; } catch (_) {}
      if (!enabled) return;
      var s = document.createElement('script');
      s.src = 'nextconsole.umd.js';
      s.onload = function () {
        try {
          // 官方 UMD 产物的全局 window.NextConsole 是命名空间对象
          // ({ NextConsole: 类, default: 类, ... })，并非构造函数本身；
          // 官方 README 的 `new NextConsole()` 示例在 UMD 下会抛
          // TypeError。取命名空间里的类再实例化。
          var ns = window.NextConsole;
          var Ctor = (ns && (ns.NextConsole || ns.default)) || ns;
          new Ctor({ theme: 'dark' });
        } catch (e) { console.error('[NextConsole] init failed', e); }
      };
      document.head.appendChild(s);
    } catch (_) {}
  })();
  </script>
  <script src="equalizer.js"></script>
  <script src="hls.min.js"></script>
  <script src="hls_bridge.js"></script>
  <script src="deploy-mode.js"></script>
  <!-- ── #278 抖动诊断探针（临时）──
       埋点显示插件 iframe 并未重载，但首页/曲库/插件页在 1920×1080 下仍整页抖动。
       此探针每帧采样 flutter-view / flt-glass-pane / flt-platform-view / iframe 的
       几何，一旦发现某元素在两个尺寸/位置间来回翻转（每帧振荡）就打一行 [sl-shake]，
       用于定位到底是哪一层在每帧改尺寸（引擎视图 resize 回路？平台视图槽？iframe 内部？）。
       默认开启；静音执行 localStorage.setItem('sl_shake_probe','off')。根因定位后移除。 -->
  <script>
  (function () {
    try { if (localStorage.getItem('sl_shake_probe') === 'off') return; } catch (_) {}
    var last = {}, flip = {};
    function rectOf(el) {
      var r = el.getBoundingClientRect();
      return Math.round(r.width) + 'x' + Math.round(r.height) +
             '@' + Math.round(r.left) + ',' + Math.round(r.top);
    }
    function collect() {
      var t = [];
      var fv = document.querySelector('flutter-view'); if (fv) t.push(['flutter-view', fv]);
      var gp = document.querySelector('flt-glass-pane'); if (gp) t.push(['glass-pane', gp]);
      var pvs = document.querySelectorAll('flt-platform-view');
      for (var i = 0; i < pvs.length; i++) t.push(['platform-view#' + i, pvs[i]]);
      var ifr = document.querySelectorAll('iframe');
      for (var j = 0; j < ifr.length; j++) t.push(['iframe#' + j, ifr[j]]);
      return t;
    }
    function sample() {
      var now = performance.now();
      collect().forEach(function (e) {
        var key = e[0], r;
        try { r = rectOf(e[1]); } catch (_) { return; }
        var prev = last[key];
        if (prev !== undefined && prev !== r) {
          var f = flip[key] || (flip[key] = { vals: {}, count: 0, start: now, lastLog: 0 });
          f.vals[r] = (f.vals[r] || 0) + 1; f.count++;
          var ks = Object.keys(f.vals);
          // 只在「恰好在两个值间来回翻转」且足够频繁时报告，避免正常变化刷屏
          if (ks.length === 2 && f.count >= 6 && now - f.lastLog > 1000) {
            f.lastLog = now;
            console.warn('[sl-shake] ' + key + ' 每帧振荡: ' + ks[0] + '  <->  ' + ks[1] +
                         '  (' + f.count + ' 次 / ' + Math.round(now - f.start) + 'ms)');
          }
        }
        last[key] = r;
      });
      requestAnimationFrame(sample);
    }
    requestAnimationFrame(sample);
  })();
  </script>
  <!--
    已知问题:移动端切后台回来可能白屏。根因是引擎 bug flutter/flutter#184683
    (CanvasKit 处理 WebGL context 丢失时访问未初始化的 late 字段,抛
    LateInitializationError,渲染帧崩溃)。官方修复 #185116 尚未进 stable 3.44.6
    (仅 beta 3.47+),当前按现状接受;待 3.47 进 stable 后升级即可根治。页面侧的
    渲染器强制/恢复绕法已移除(在含 bug 的版本上要么无效、要么反而触发崩溃)。
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    var config = {
      canvasKitVariant: "full",
    };

    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
