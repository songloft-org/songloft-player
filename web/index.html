<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Songloft - 跨平台音乐播放器">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <script src="equalizer.js"></script>
  <script src="hls.min.js"></script>
  <script src="hls_bridge.js"></script>
  <script src="deploy-mode.js"></script>
  <script>
    // Reload-free CanvasKit surface recovery for mobile browsers.
    //
    // On mobile Chrome the WebGL/GPU context backing CanvasKit is discarded when
    // the tab is backgrounded (memory pressure / GPU reclaim). The engine's
    // Surface receives 'webglcontextlost', flags `_forceNewContext = true`, calls
    // preventDefault() to opt into restoration, then waits passively for a
    // 'webglcontextrestored' event to re-render -- an event Android Chrome often
    // never fires. The app keeps running (gestures/routing) but paints black.
    //
    // The engine already carries all the machinery to recover: its multi-surface
    // rasterizer calls Surface.createOrUpdateSurface() on EVERY rendered frame,
    // and when `_forceNewContext` is set that call builds a brand-new <canvas> +
    // fresh GL context + SkSurface, dropping the dead one. So we don't destroy or
    // reload anything -- on resume we simply DRIVE A FRAME and let the engine
    // rebuild its surface in place. If the GPU is momentarily still unavailable
    // the engine falls back to a CPU surface (still visible, not black).
    //
    // This requires the onscreen (multi-surface) rasterizer, forced on mobile in
    // the config block below, so the context lives on a reachable DOM <canvas>
    // (Chrome otherwise renders through an off-DOM OffscreenCanvas whose context
    // the engine cannot observe as lost). The only WebGL canvas on this page is
    // Flutter's (equalizer.js uses Web Audio, hls.js uses MediaSource).
    //
    // NB: two earlier bugs made this path fall through to window.location.reload
    // (the full refresh users disliked): (1) forcing WEBGL_lose_context.loseContext()
    // without ever calling restoreContext() stranded the context permanently; and
    // (2) nudging the engine with `window.dispatchEvent('resize')` -- but the
    // full-page dimensions provider listens on `window.visualViewport`, so the
    // event never reached the engine. Both are fixed below; there is no reload.
    (function () {
      var lostSinceHidden = false;

      document.addEventListener('webglcontextlost', function (e) {
        // Opt into browser restoration and remember a loss happened while hidden.
        e.preventDefault();
        lostSinceHidden = true;
      }, true);

      // Collect every <canvas>, descending into shadow roots to be safe.
      function collectCanvases(root, out) {
        var direct = root.querySelectorAll('canvas');
        for (var i = 0; i < direct.length; i++) out.push(direct[i]);
        var all = root.querySelectorAll('*');
        for (var j = 0; j < all.length; j++) {
          if (all[j].shadowRoot) collectCanvases(all[j].shadowRoot, out);
        }
        return out;
      }

      function glOf(canvas) {
        try {
          return canvas.getContext('webgl2') || canvas.getContext('webgl');
        } catch (_) {
          return null;
        }
      }

      function lostCanvases() {
        var out = [];
        var canvases = collectCanvases(document, []);
        for (var i = 0; i < canvases.length; i++) {
          var gl = glOf(canvases[i]);
          if (gl && gl.isContextLost()) out.push(canvases[i]);
        }
        return out;
      }

      // Route a frame through the engine so its rasterizer runs
      // createOrUpdateSurface() and rebuilds the surface in place. The full-page
      // dimensions provider listens for 'resize' on visualViewport (falling back
      // to window on older browsers), so dispatch to both. This reaches
      // invokeOnMetricsChanged() -> a forced frame -> a fresh canvas+context when
      // the engine has `_forceNewContext` set.
      function driveFrame() {
        try {
          if (window.visualViewport) {
            window.visualViewport.dispatchEvent(new Event('resize'));
          }
        } catch (_) {}
        try { window.dispatchEvent(new Event('resize')); } catch (_) {}
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState !== 'visible') return;

        // Only intervene when a context loss actually occurred (observed event or
        // a canvas currently reporting lost); a healthy app is left untouched so
        // we never cause a needless rebuild flash on an ordinary tab switch.
        if (!lostSinceHidden && lostCanvases().length === 0) return;
        lostSinceHidden = false;

        // Drive frames over a short window. The engine normally rebuilds on the
        // first frame after resume (it already flagged _forceNewContext when it
        // saw the real 'webglcontextlost'). If a canvas still reports lost after
        // a couple of nudges, re-dispatch a synthetic 'webglcontextlost' on it to
        // (re-)arm the engine's _forceNewContext, then drive another frame. No
        // context is destroyed and the page is NEVER reloaded.
        var tries = 0;
        driveFrame();
        var timer = setInterval(function () {
          tries++;
          var lost = lostCanvases();
          if (lost.length === 0) {
            clearInterval(timer); // recovered in place
            return;
          }
          if (tries >= 2) {
            for (var i = 0; i < lost.length; i++) {
              try { lost[i].dispatchEvent(new Event('webglcontextlost')); } catch (_) {}
            }
          }
          driveFrame();
          if (tries >= 12) clearInterval(timer); // ~5s; give up quietly, never reload
        }, 400);
      });
    })();
  </script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    var config = {
      canvasKitVariant: "full",
    };

    // Force the onscreen (multi-surface) CanvasKit rasterizer on mobile
    // browsers. Chrome's default OffscreenCanvas rasterizer keeps its WebGL
    // context on an OffscreenCanvas that is never attached to the DOM, so a
    // background GPU-context loss is invisible to the page and cannot be
    // recovered (the app paints black until a manual refresh). The onscreen
    // rasterizer (already the default on Safari/Firefox) puts the context on a
    // DOM <canvas>, which lets Flutter auto-recover on context loss and lets the
    // in-place rebuild above reach the context. Desktop keeps the offscreen path.
    var isMobileBrowser = /Android|iPhone|iPad|iPod|Mobile|Silk|Kindle/i.test(
      navigator.userAgent || ''
    );
    if (isMobileBrowser) {
      config.canvasKitForceMultiSurfaceRasterizer = true;
    }

    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
