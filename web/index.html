<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Songloft - 跨平台音乐播放器">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <script src="equalizer.js"></script>
  <script src="hls.min.js"></script>
  <script src="hls_bridge.js"></script>
  <script src="deploy-mode.js"></script>
  <script>
    // WebGL context recovery for mobile browsers.
    // Mobile browsers may destroy WebGL contexts when tabs are backgrounded,
    // causing CanvasKit to render a black screen when the user returns.
    (function() {
      document.addEventListener('webglcontextlost', function(e) {
        e.preventDefault();
      }, true);

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState !== 'visible') return;

        setTimeout(function() {
          var canvases = document.querySelectorAll('canvas');
          var hasLostContext = false;

          for (var i = 0; i < canvases.length; i++) {
            var gl = canvases[i].getContext('webgl2') || canvases[i].getContext('webgl');
            if (gl && gl.isContextLost()) {
              hasLostContext = true;
              try {
                var ext = gl.getExtension('WEBGL_lose_context');
                if (ext) ext.restoreContext();
              } catch (_) {}
            }
          }

          if (hasLostContext) {
            setTimeout(function() {
              var cs = document.querySelectorAll('canvas');
              for (var j = 0; j < cs.length; j++) {
                var g = cs[j].getContext('webgl2') || cs[j].getContext('webgl');
                if (g && g.isContextLost()) {
                  window.location.reload();
                  return;
                }
              }
            }, 3000);
          }
        }, 500);
      });
    })();
  </script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    var config = {
      canvasKitVariant: "full",
    };
    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
