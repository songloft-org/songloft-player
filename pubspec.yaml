name: songloft_flutter
description: Songloft - 跨平台音乐播放器
publish_to: 'none'
version: 2.0.0-alpha.2+1
license: Apache-2.0

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  # 路由
  go_router: ^17.1.0
  # HTTP
  dio: ^5.7.0
  # 音频播放
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.0.0  # Windows/Linux 平台的 just_audio 后端（libmpv）
  media_kit_libs_windows_audio: any  # Windows 平台 media_kit 音频库
  audio_service: ^0.18.17
  audio_session: ^0.2.3
  # 权限管理
  permission_handler: ^12.0.1
  # 本地存储
  shared_preferences: ^2.3.4
  path_provider: ^2.1.0
  # 图片缓存
  cached_network_image: ^3.4.1
  # 颜色提取
  palette_generator: ^0.3.3+4
  # UI
  # 文件选择
  file_picker: ^10.3.10
  # 工具
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6
  # WebView（用于应用内加载插件页面）
  flutter_inappwebview: ^6.1.5
  json_annotation: ^4.9.0
  # 系统音量控制
  volume_controller: ^2.0.7
  # 窗口和系统托盘
  window_manager: ^0.4.3
  tray_manager: ^0.2.4
  windows_single_instance: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.14
  json_serializable: ^6.9.3
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - windows/runner/resources/app_icon.ico
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.otf
